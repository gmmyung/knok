name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      execute:
        description: Publish crates to crates.io
        required: true
        type: boolean
        default: false
      version:
        description: Version to validate for manual publish, without leading v
        required: false
        type: string
        default: ""

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      - if: ${{ github.event_name == 'workflow_dispatch' && inputs.execute && inputs.version == '' }}
        run: |
          echo "manual publish requires the version input" >&2
          exit 2
      - name: Ensure release tag is on main
        if: ${{ github.ref_type == 'tag' }}
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "release tag ${GITHUB_REF_NAME} (${GITHUB_SHA}) is not reachable from origin/main" >&2
            echo "merge the release commit into main before pushing the tag" >&2
            exit 2
          fi
      - name: Ensure manual publish runs from main
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.execute }}
        run: |
          if [[ "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "manual publish must run from main, got ${GITHUB_REF_NAME}" >&2
            exit 2
          fi
      - if: ${{ github.ref_type == 'tag' }}
        run: nix develop --command scripts/verify-release.sh "${GITHUB_REF_NAME}"
      - if: ${{ github.event_name == 'workflow_dispatch' && inputs.version != '' }}
        run: nix develop --command scripts/verify-release.sh "v${{ inputs.version }}"
      - run: nix develop --command scripts/release-check.sh
      - run: nix develop --command scripts/publish.sh --dry-run
      - if: ${{ github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && inputs.execute) }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
            echo "CARGO_REGISTRY_TOKEN secret is required to publish" >&2
            exit 2
          fi
          nix develop --command scripts/publish.sh --execute
