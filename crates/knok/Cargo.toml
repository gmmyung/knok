[package]
name = "knok"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Compile-time linalg graphs for Rust"

[dependencies]
eerie = { workspace = true, optional = true }
knok-macros.workspace = true

[dev-dependencies]
criterion.workspace = true
nalgebra.workspace = true
ndarray.workspace = true
trybuild.workspace = true

[[bench]]
name = "runtime"
harness = false

[features]
default = ["std", "host-runtime"]
std = ["eerie?/std"]
host-runtime = ["std", "dep:eerie", "eerie/runtime", "eerie/std"]
embedded-runtime = ["dep:eerie", "eerie/runtime"]
